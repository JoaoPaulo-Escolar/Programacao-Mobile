<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Média</title>
</head>
<body>

<h2>Calculadora de Média</h2>

<table border="1">
    <tr>
        <td>Nota 1:</td>
        <td><input type="text" id="nota1"></td>
    </tr>
    <tr>
        <td>Nota 2:</td>
        <td><input type="text" id="nota2"></td>
    </tr>
</table>

<br>

<button onclick="calcularMedia()">Calcular Média</button>

<p id="resultado"></p>

<!--JavaScript-->
<script>
function calcularMedia() {
    let nota1 = document.getElementById("nota1").value;
    let nota2 = document.getElementById("nota2").value;
    let resultado = document.getElementById("resultado");

    if (nota1 === "" || nota2 === "") {
        resultado.innerText = "Por favor, preencha todas as notas.";
        return;
    }

    nota1 = parseFloat(nota1);
    nota2 = parseFloat(nota2);

    if (isNaN(nota1) || isNaN(nota2)) {
        resultado.innerText = "Digite apenas números válidos.";
        return;
    }

    if (nota1 < 0 || nota1 > 10 || nota2 < 0 || nota2 > 10) {
        resultado.innerText = "As notas devem estar entre 0 e 10.";
        return;
    }

    let media = (nota1 + nota2) / 2;

    let situacao;

    if (media >= 7) {
        situacao = "Aprovado";
    } else if (media >= 5) {
        situacao = "Recuperação";
    } else {
        situacao = "Reprovado";
    }

    resultado.innerHTML = "Média: " + media.toFixed(1) + "<br>Situação: " + situacao;
}
</script>

</body>
</html>
